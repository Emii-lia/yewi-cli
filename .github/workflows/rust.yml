name: Rust

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '.github/workflows/**'  
      - 'LICENSE'
      - '*.md'
      - '.gitignore'
      - '.dockerignore'
      - 'compose.yml'
      - 'Dockerfile'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'LICENSE'
      - '*.md'
      - '.gitignore'
      - '.dockerignore'
      - 'compose.yml'
      - 'Dockerfile'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
